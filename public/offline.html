<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline — Shalah Rex Laundry</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
        background: #f7f9fb;
        color: #191c1e;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.25rem;
      }
      img { width: 96px; height: 96px; margin-bottom: 1.5rem; }
      h1 {
        font-family: 'Manrope', system-ui, sans-serif;
        font-size: 24px;
        font-weight: 700;
        margin: 0 0 0.5rem;
        color: #102A43;
      }
      p { font-size: 16px; color: #414754; max-width: 320px; line-height: 24px; margin: 0 0 1.5rem; }
      button {
        font-family: inherit;
        font-weight: 700;
        font-size: 16px;
        color: #ffffff;
        background: #005bbf;
        border: none;
        border-radius: 0.5rem;
        padding: 0.75rem 1.5rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="/icons/icon-192.png" alt="" />
      <h1>You're offline</h1>
      <p>Shalah Rex Laundry needs an internet connection for this page. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
